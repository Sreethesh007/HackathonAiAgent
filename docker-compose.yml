version: "3.9"

# ── Healthcare Triage Agent — Local On-Premise Stack ─────────────────────────
# Services:
#   app        — FastAPI triage agent (port 8000)
#   chroma     — Local vector store   (port 8001)
#   prometheus — Metrics scraper      (port 9090)
#   grafana    — Dashboard            (port 3000)
#
# Quickstart:
#   cp .env.example .env && nano .env   # fill ANTHROPIC_API_KEY
#   docker compose up -d
#   curl http://localhost:8000/health

services:

  # ── Angular Frontend (Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: triage-frontend
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - triage-net

  # ── Triage Agent API ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: healthcare-triage-agent:latest
    container_name: triage-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=/data/chroma
      - SESSION_DIR=/data/sessions
      - FAILED_FLOWS_DIR=/data/failed_flows
      - API_WORKERS=2
      # When using llama.cpp, point to the container name:
      # - LLAMACPP_BASE_URL=http://llamacpp:8080
    volumes:
      - chroma_data:/data/chroma
      - session_data:/data/sessions
      - failed_flows:/data/failed_flows
      - ./docs:/app/docs
    depends_on:
      chroma:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - triage-net

  # ── llama.cpp Local LLM Server (optional — zero API cost) ──────────────────
  # Activate by running:   docker compose --profile llamacpp up
  #
  # You must place a .gguf model file in ./models/ first:
  #   python scripts/download_model.py --model llama3.1-8b-q4
  #
  # Then switch your .env:
  #   LLM_PROVIDER=llamacpp
  #   LLAMACPP_BASE_URL=http://llamacpp:8080
  llamacpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: triage-llamacpp
    profiles: ["llamacpp"]          # only starts with: docker compose --profile llamacpp up
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro         # mount your downloaded .gguf files here
    command: >
      --model /models/llama-3.1-8b-instruct.Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 0
      --threads 4
      --ctx-size 4096
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s            # model loading takes time
    networks:
      - triage-net

  # ── ChromaDB Vector Store ───────────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    container_name: triage-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - triage-net

  # ── Prometheus Metrics ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: triage-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    restart: unless-stopped
    networks:
      - triage-net

  # ── Grafana Dashboard ───────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: triage-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - triage-net

volumes:
  chroma_data:
    driver: local
  session_data:
    driver: local
  failed_flows:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  triage-net:
    driver: bridge
