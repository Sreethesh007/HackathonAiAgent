name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Minimal env for tests (no real API key needed — all LLM calls are mocked)
  ANTHROPIC_API_KEY: "test-key-not-real"
  JWT_SECRET: "test-secret-for-ci"
  SUPABASE_URL: "https://test-supabase-url.supabase.co"
  SUPABASE_KEY: "test-supabase-key"
  CHROMA_PERSIST_DIR: "./data/chroma"
  SESSION_DIR: "./data/sessions"
  FAILED_FLOWS_DIR: "./data/failed_flows"
  LOG_LEVEL: "WARNING"
  ENVIRONMENT: "development"

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Create data directories
        run: mkdir -p data/chroma data/sessions data/failed_flows docs

      - name: Lint with ruff
        run: ruff check src/ tests/ examples/ || true   # warn only in CI

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=src --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=40

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: healthcare-triage-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
